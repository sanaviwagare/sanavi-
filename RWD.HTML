<HTML>
<HEAD>
<TITLE> RESPONSIVE WEB DISIGN DEMO </TITLE>
<META NAME="VIEWPORT" CONTENT="WIDTH=DEVICE-WIDTH,INITIAL-SCALE=1.0">
<STYLE>
BODY{
MARGINE:0;
FONT FAMILY:ARIAL,SANS-SERIF;
}
HEADER{
BACKGROUND-COLOR:#4CAF50;
COLOR:WHITE;
TEXT-ALIGN:CENTER;
PADDING:15PX;
}
NAV {
BACKGROUND:#333;
PADDING:10PX;
TEXT-ALIGN:CENTER;
}
NAV A{
COLOR:WHITE;
TEXT-DECORATION:NONE;
MARGINE:10PX;
}
.CONTAINER {
DISPLAY:FLEX;
PADDING:20PX;
}
.BOX {
FLEX:1;
PADDING:20PX;
MARGINE:10PX;
BACKGROUND-COLOR:LIGHTWAY;
TEXT-ALIGN:CENTER;
}
FOOTER{
BACKGROUND-COLOR:#222;
CLOR:WHITE;
TEXT-ALIGN:CENTER;
PADDING:10PX;
}
@MEDIA SCREEN AND (MAX-WIDTH: 76PX) {
.CONTAINER {
FLEX-DIRECTION:COLUMN;
}
NAV {
DISPLAY:BLOCK;
}
}
</STYLE>
</HEAD>
<BODY>
<HEADER>
<H1> RESPONSIVE WEB DESIGN </H1>
</HEADER>
<NAV>
<A HREF="#">HOME</A>
<A HREF="#">ABOUT</A>
<A HREF="#">SERVICE</A>
<A HREF="#">CONTACT</A>
</NAV>
<DIV CLASS="CONTAINER">
<DIV CLASS="BOX">CONTENT 1</DIV>
<DIV CLASS="BOX">CONTENT 2</DIV>
<DIV CLASS="BOX">CONTENT 3</DIV>
</DIV>
<FOOTER>
<P> ©2026 RESPONSIVE WEB PAGE</P>
</FOOTER>
